services:
  postgres:
    image: postgres:17-alpine
    container_name: enky-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: enky
      POSTGRES_PASSWORD: enky
      POSTGRES_DB: enky_dev
    ports:
      - "5433:5432"
    volumes:
      - enky_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enky -d enky_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  enky_postgres_data:
